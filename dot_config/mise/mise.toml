min_version = "2025.11.8"

[tools]
bat = "0.25.0"
btop = "1.4.4"
chezmoi = "latest"
doggo = "1.0.5"
fd = "10.2.0"
fzf = "0.62.0"
github-cli = "2.82.1"
jj = "0.34.0"
lsd = "1.1.5"
node = "23.11.0"
ripgrep = "14.1.1"
starship = "1.23.0"
"github:nushell/nushell" = { version = "0.108.0", exe = "nu" }
zellij = "0.43.0"
zoxide = "0.9.8"
lazygit = "0.57.0"
cloudflared = "2025.11.1"
"aqua:neovim" = "0.11.6"
go = "1.25.6"
"ubi:supabase/cli" = { version = "2.98.2", exe = "supabase" }
deno = "2.7.14"
"npm:wrangler" = "4.88.0"
"github:anomalyco/opencode" = "1.15.4"
"npm:@google/gemini-cli" = "0.41.2"
"npm:aicommits" = "3.1.2"
"npm:@agentmemory/agentmemory" = "latest"
"npm:iii-sdk" = "0.12.0"

[settings]
experimental = true
lockfile = true
pin = true
disable_backends = ["asdf", "vfox"] # Don't use these backends

[env]
OPENCODE_EXPERIMENTAL_BASH_DEFAULT_TIMEOUT_MS = '240000'

[tasks.llama-server.env]
HF_HUB_ENABLE_HF_TRANSFER = "1"
LLAMA_ARG_HOST = "0.0.0.0"
LLAMA_ARG_PORT = "8080"
