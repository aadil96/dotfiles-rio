schema_version: 1
migration_version: 1
name: backend-service
description: Deployable runtime with APIs, infrastructure, and operational lifecycle.
extends: common

defaults:
  project:
    language: ""
    runtime: container
    database: ""
    cache: ""

required_workflows:
  - feature-development
  - bug-fix
  - deployment

optional_workflows:
  - architecture-review
  - incident-response
  - security-review

required_skills:
  - feature-lifecycle
  - deployment-lifecycle

recommended_skills:
  - architecture-principles
  - security-policies
  - code-philosophy
  - code-review
  - plan-protocol
  - plan-review

org_participants:
  always:
    - PM
    - CTO
    - DevOps
  conditional:
    Security: "auth, secrets, external dependencies, or PII"
    QA: "release validation"
    Finance: "infrastructure costs or licensing"

components:
  optional:
    - auth
    - observability
    - queue
    - notifications
