schema_version: 1
migration_version: 1
name: cli-tool
description: Command-line tool with executable interface. Extends library with CLI-specific concerns.
extends: library

defaults:
  project:
    language: ""
    package_type: cli
    runtime: ""

required_workflows:
  - feature-development
  - bug-fix

optional_workflows:
  - architecture-review
  - deployment

required_skills:
  - feature-lifecycle

recommended_skills:
  - architecture-principles
  - code-philosophy
  - code-review
  - plan-protocol

org_participants:
  always:
    - CTO
  conditional:
    Security: "auth, secrets, or external dependencies"
    DevOps: "distribution or packaging"

components:
  optional: []
