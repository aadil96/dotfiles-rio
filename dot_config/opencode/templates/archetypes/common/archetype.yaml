schema_version: 1
migration_version: 1
name: common
description: Base archetype for all project types. Provides shared defaults for project identity, stack documentation, and core workflows.

defaults:
  project:
    name: ""
    description: ""

required_workflows:
  - feature-development
  - bug-fix

optional_workflows: []

required_skills:
  - feature-lifecycle

recommended_skills:
  - code-philosophy
  - code-review
  - plan-protocol
  - plan-review

org_participants:
  always:
    - PM
    - CTO
  conditional:
    Security: "auth, secrets, external dependencies, or PII"
    QA: "release validation"
    DevOps: "deployment or infrastructure changes"
    Finance: "infrastructure costs or licensing"

components:
  optional: []
