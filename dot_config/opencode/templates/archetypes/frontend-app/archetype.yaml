schema_version: 1
migration_version: 1
name: frontend-app
description: Standalone UI application with frontend framework, build tooling, and styling.
extends: common

defaults:
  project:
    language: ""
    framework: ""
    styling: ""

required_workflows:
  - feature-development
  - bug-fix
  - deployment

optional_workflows:
  - architecture-review

required_skills:
  - feature-lifecycle
  - deployment-lifecycle

recommended_skills:
  - frontend-philosophy
  - architecture-principles
  - code-philosophy
  - code-review
  - plan-protocol

org_participants:
  always:
    - PM
    - CTO
  conditional:
    Security: "auth, secrets, or PII"
    DevOps: "deployment or hosting"
    QA: "release validation"

components:
  optional:
    - auth
    - observability
    - notifications
