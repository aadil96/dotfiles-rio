schema_version: 1
migration_version: 1
name: infrastructure
description: Infrastructure and platform code such as Terraform, Kubernetes, CI/CD pipelines, and cloud resources.
extends: common

defaults:
  project:
    provider: ""
    environment: ""

required_workflows:
  - feature-development
  - bug-fix
  - deployment
  - architecture-review

optional_workflows:
  - incident-response
  - security-review

required_skills:
  - feature-lifecycle
  - deployment-lifecycle

recommended_skills:
  - architecture-principles
  - architecture-lifecycle
  - security-policies
  - cost-optimization
  - code-review
  - plan-protocol

org_participants:
  always:
    - CTO
    - DevOps
    - Security
  conditional:
    Finance: "infrastructure costs or licensing"
    QA: "release validation"

components:
  optional:
    - observability
    - queue
