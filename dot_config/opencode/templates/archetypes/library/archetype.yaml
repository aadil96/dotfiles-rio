schema_version: 1
migration_version: 1
name: library
description: Reusable package with minimal deployment concerns. Suitable for SDKs, utilities, and shared libraries.
extends: common

defaults:
  project:
    language: ""
    package_type: library

required_workflows:
  - feature-development
  - bug-fix

optional_workflows:
  - architecture-review

required_skills:
  - feature-lifecycle

recommended_skills:
  - architecture-principles
  - code-philosophy
  - code-review
  - plan-protocol

org_participants:
  always:
    - CTO
  conditional:
    Security: "auth, secrets, or external dependencies"

components:
  optional: []
