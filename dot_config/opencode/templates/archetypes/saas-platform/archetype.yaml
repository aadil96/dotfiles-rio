schema_version: 1
migration_version: 1
name: saas-platform
description: Multi-tenant SaaS platform with auth, billing, cost controls, and incident management. Extends backend-service.
extends: backend-service

defaults:
  project:
    language: ""
    runtime: container
    database: ""
    cache: ""
    multi_tenant: true

required_workflows:
  - feature-development
  - bug-fix
  - deployment
  - incident-response
  - architecture-review

optional_workflows:
  - security-review

required_skills:
  - feature-lifecycle
  - deployment-lifecycle
  - incident-lifecycle

recommended_skills:
  - architecture-principles
  - architecture-lifecycle
  - security-policies
  - cost-optimization
  - code-philosophy
  - code-review
  - plan-protocol
  - plan-review

org_participants:
  always:
    - PM
    - CTO
    - DevOps
    - Security
    - Finance
  conditional:
    QA: "release validation"

components:
  optional:
    - auth
    - payments
    - observability
    - queue
    - notifications
